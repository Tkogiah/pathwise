services:
  postgres:
    image: postgres:16-alpine
    container_name: pathwise-postgres
    environment:
      POSTGRES_USER: pathwise
      POSTGRES_PASSWORD: pathwise
      POSTGRES_DB: pathwise_dev
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pathwise -d pathwise_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment to enable pgAdmin at http://localhost:5050
  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: pathwise-pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@pathwise.dev
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - '5050:80'
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  pgdata:
